[tasks.fmt]
description = 'Format fish files'
run = 'find . -name "*.fish" -type f -print0 | xargs -0 fish_indent --write'

[tasks.lint]
description = 'Syntax-check fish files'
run = 'find . -name "*.fish" -type f -print0 | xargs -0 -n1 fish --no-execute'

[tasks.install]
description = 'Install Tide and test dependencies via fisher'
run = '''
fish -c 'type -q fisher || begin; curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source; fisher install jorgebucaran/fisher; end'
fish -c 'if test -e ~/.config/fish/functions/tide.fish; else; fisher install . >/dev/null; end'
'''

[tasks.littlecheck]
description = 'Download littlecheck test runner'
# littlecheck has no tags/releases to pin to, so we pin a commit SHA instead of
# tracking HEAD, so upstream changes can't silently break our tests/CI.
run = 'curl -sL https://raw.githubusercontent.com/ridiculousfish/littlecheck/c44c157d3666b9a447e20977eec6eb4bd2a0c304/littlecheck/littlecheck.py -o littlecheck.py'

[tasks.test]
description = 'Run test suite'
depends = ['littlecheck']
file = 'scripts/test.fish'

[tasks.test-clean]
description = 'Remove the cached local test HOME used by `mise run test`'
file = 'scripts/test_clean.fish'

[tasks.clean]
description = 'Remove generated test helper'
run = 'rm -f littlecheck.py'

[tasks.all]
description = 'Format, lint, install, and test'
depends = ['fmt', 'lint', 'install', 'test']
